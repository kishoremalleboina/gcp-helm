name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # Required for OIDC

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # 🔹 Authenticate to GCP using OIDC
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: projects/946678058338/locations/global/workloadIdentityPools/github-pool/providers/github-provider
        service_account: github-sa@dev-project-490411.iam.gserviceaccount.com

    - name: setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    - name: Install GKE auth plugin
      run: |
        gcloud components install gke-gcloud-auth-plugin --quiet

    - name: get gke credentails
      run: |
        gcloud container clusters get-credentials my-gke-cluster --region us-central1 --project dev-project-490411

    - name: install helm
      uses: azure/setup-helm@v4

    - name: deploy helm
      run: helm upgrade --install my-app . -f values.dev.yaml --namespace dev --create-namespace

        
