{{- range .Values.services }}
{{- $gw := .gw_http_route | default dict }}

{{- if $gw.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .service_name }}-route

spec:
  parentRefs:
    - name: {{ $gw.gateway_name }}

  hostnames:
    {{- range ($gw.hosts | default list) }}
    - {{ .domainName }}
    {{- end }}

  rules:
    {{- range ($gw.matchRules | default list) }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ .path }}
      backendRefs:
        - name: {{ .backend.name }}
          port: {{ .backend.port }}
    {{- end }}
{{- end }}
{{- end }}