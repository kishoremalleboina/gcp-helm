{{- range .Values.services }}

{{- if (default false .gw_http_route.enabled) }}

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .service_name }}-route

spec:
  parentRefs:
    - name: {{ $.Values.gateway.name }}
      kind: Gateway

  hostnames:
    - {{ $.Values.gateway.host }}

  rules:
    {{- range .gw_http_route.matchRules }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ .path }}

      backendRefs:
        - name: {{ .backend.name }}
          port: {{ .backend.port }}
    {{- end }}

{{- end }}

{{- end }}