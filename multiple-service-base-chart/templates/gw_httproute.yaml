{{- if .Values.gw_http_route.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.service_name }}-route
spec:
  parentRefs:
    - name: {{ .Values.gw_http_route.gateway_name }}
  hostnames:
    {{- range .Values.gw_http_route.hosts }}
    - {{ .domainName | quote }}
    {{- end }}
  rules:
    {{- range .Values.gw_http_route.matchRules }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ .path }}
      backendRefs:
        - name: {{ .backend.name }}
          port: {{ .backend.port }}
    {{- end }}
{{- end }}