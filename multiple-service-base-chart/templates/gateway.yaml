{{- $gw := (index .Values.services 0).gw_http_route | default dict }}

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $gw.gateway_name }}

spec:
  gatewayClassName: gke-l7-global-external-managed

  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: {{ (index ($gw.hosts | default list) 0).domainName }}

      tls:
        mode: Terminate
        options:
          networking.gke.io/certmap: {{ $gw.certificate_map_name }}