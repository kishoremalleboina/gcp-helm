{{- range .Values.services }}
{{- if and .gw_http_route .gw_http_route.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .service_name }}-route
  annotations:
    {{- if .gw_http_route.backend_policy.enabled }}
    alb.networking.azure.io/policy: {{ .gw_http_route.backend_policy.securityPolicy.policyName | quote }}
    {{- end }}
spec:
  parentRefs:
    - name: {{ .gw_http_route.gateway_name }}
      group: gateway.networking.k8s.io
      kind: Gateway
  hostnames:
    {{- range .gw_http_route.hosts }}
    - {{ .domainName | quote }}
    {{- end }}
  rules:
    {{- range .gw_http_route.matchRules }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ .path }}
      backendRefs:
        - name: {{ .backend.name | default $.service_name }}
          port: {{ .backend.port }}
    {{- end }}
{{- end }}
{{- end }}