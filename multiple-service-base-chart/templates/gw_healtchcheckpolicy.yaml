{{- range .Values.services }}

{{- if .gw_http_route.healthCheckPolicy.enabled }}

apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: {{ .service_name }}-hc

spec:
  targetRef:
    group: ""
    kind: Service
    name: {{ .service_name }}

  default:
    checkIntervalSec: {{ .gw_http_route.healthCheckPolicy.checkIntervalSec }}
    timeoutSec: {{ .gw_http_route.healthCheckPolicy.timeoutSec }}
    healthyThreshold: {{ .gw_http_route.healthCheckPolicy.healthyThreshold }}
    unhealthyThreshold: {{ .gw_http_route.healthCheckPolicy.unhealthyThreshold }}

    config:
      type: HTTP
      httpHealthCheck:
        requestPath: {{ .gw_http_route.healthCheckPolicy.requestPath }}

{{- end }}

{{- end }}